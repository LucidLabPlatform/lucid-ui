<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LUCID — Fleet Unified</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1017; --surface: #1a2036; --surface2: #141c2e;
  --surface-hover: #1e2744; --border: #283044; --border2: #1e2a3a;
  --text: #e2e8f0; --muted: #8494ab; --subtle: #94a3b8;
  --accent: #60a5fa; --green: #4ade80; --red: #f87171;
  --yellow: #facc15; --orange: #fb923c;
  --radius: 8px; --radius-sm: 5px;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
  --transition: 120ms ease;
}
body { font-family: system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); font-size:13px; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* ── Nav ── */
.topnav { display:flex; align-items:center; gap:.65rem; padding:0 1.25rem; height:44px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; position:relative; z-index:200; }
.brand { font-weight:700; color:var(--accent); letter-spacing:.05em; font-size:.9rem; }
.nav-sep { color:var(--muted); font-size:.8rem; }
.nav-links { display:flex; gap:2px; margin-left:.5rem; }
.nav-link { color:var(--muted); font-size:.78rem; padding:.28rem .65rem; border-radius:var(--radius-sm); cursor:pointer; }
.nav-link:hover { background:var(--border); color:var(--text); }
.nav-link.active { background:var(--border); color:var(--text); }
.nav-tools-wrap { position:relative; }
.nav-tools { color:var(--muted); font-size:.78rem; padding:.28rem .65rem; border-radius:var(--radius-sm); cursor:pointer; border:1px solid var(--border); }
.nav-tools:hover { background:var(--border); color:var(--text); }
.tools-dropdown { display:none; position:absolute; top:calc(100% + 6px); left:0; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; min-width:145px; z-index:300; box-shadow:0 8px 24px rgba(0,0,0,.4); }
.tools-dropdown.open { display:block; }
.tools-item { display:block; padding:.45rem .9rem; font-size:.78rem; color:var(--muted); cursor:pointer; }
.tools-item:hover { background:var(--surface-hover); color:var(--text); }
.ws-badge { margin-left:auto; font-size:.7rem; font-weight:600; padding:.18rem .55rem; border-radius:999px; background:#14532d; color:var(--green); }

/* ── Fleet layout ── */
.fleet-layout { display:flex; flex:1; overflow:hidden; }

/* Sidebar */
.fleet-sidebar { width:195px; flex-shrink:0; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; background:#111827; }
.sidebar-header { padding:.7rem 1rem .5rem; font-size:.67rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.sidebar-count { font-size:.68rem; color:var(--muted); font-weight:400; text-transform:none; letter-spacing:0; }
.sidebar-list { flex:1; overflow-y:auto; padding:.3rem 0; }
.sidebar-item { display:flex; align-items:center; gap:.55rem; padding:.5rem 1rem; cursor:pointer; border-left:2px solid transparent; transition:background var(--transition); }
.sidebar-item:hover { background:var(--surface-hover); }
.sidebar-item.active { background:#1e2a44; border-left-color:var(--accent); }
.status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.dot-online  { background:var(--green); box-shadow:0 0 5px rgba(74,222,128,.5); }
.dot-error   { background:var(--orange); }
.dot-unknown { background:#374151; }
.sidebar-agent-name { font-size:.83rem; color:var(--text); font-weight:500; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sidebar-item.active .sidebar-agent-name { color:var(--accent); }
.sidebar-item.stale .sidebar-agent-name { color:var(--muted); }
.sidebar-sep { margin:.35rem 1rem; border:none; border-top:1px solid var(--border); }
.sidebar-clean-btn { margin:.3rem .75rem .5rem; background:none; border:1px solid var(--border); border-radius:var(--radius-sm); padding:.3rem .6rem; font-size:.68rem; color:var(--muted); cursor:pointer; width:calc(100% - 1.5rem); text-align:left; }
.sidebar-clean-btn:hover { background:var(--surface-hover); color:var(--red); border-color:var(--red); }

/* ── Agent panel (right side) ── */
.fleet-detail { flex:1; display:flex; flex-direction:column; overflow:hidden; }

.agent-header { padding:.75rem 1.25rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:.75rem; flex-shrink:0; background:var(--surface); }
.agent-name-large { font-size:1.05rem; font-weight:700; }
.status-badge { font-size:.7rem; font-weight:600; padding:.16rem .6rem; border-radius:999px; }
.badge-online  { background:#14532d; color:var(--green); }
.badge-running { background:#14532d; color:var(--green); }
.badge-error   { background:#431407; color:var(--orange); }
.badge-idle    { background:#2a2a0a; color:var(--yellow); }
.agent-meta-bar { margin-left:auto; font-size:.73rem; color:var(--muted); }

/* ── Tab bar (inside right panel) ── */
.agent-tabs { display:flex; gap:0; padding:0 1.25rem; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.tab-btn { font-size:.79rem; color:var(--muted); padding:.58rem .9rem; cursor:pointer; border-bottom:2px solid transparent; transition:color var(--transition); user-select:none; }
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ── Tab panes ── */
.tab-pane { display:none; flex:1; overflow:hidden; flex-direction:column; }
.tab-pane.active { display:flex; }

/* Components tab */
.components-tab { flex:1; overflow-y:auto; padding:1rem 1.25rem; display:grid; grid-template-columns:190px 1fr; gap:1rem; align-content:start; }

/* Info card */
.info-section { display:flex; flex-direction:column; gap:1rem; }
.info-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.info-card-title { font-size:.63rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); padding:.5rem .85rem; border-bottom:1px solid var(--border); background:var(--surface2); }
.kv-table { width:100%; border-collapse:collapse; }
.kv-table tr:not(:last-child) td { border-bottom:1px solid var(--border2); }
.kv-table td { padding:.38rem .85rem; font-size:.77rem; }
.kv-key { color:var(--muted); width:48%; }
.kv-val { color:var(--text); font-family:var(--font-mono); font-size:.73rem; }

/* Component cards */
.components-section { display:flex; flex-direction:column; gap:.65rem; }
.comp-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.comp-card.comp-error { border-color:#3a2010; }
.comp-card-header { display:flex; align-items:center; gap:.6rem; padding:.52rem .85rem; border-bottom:1px solid var(--border); background:var(--surface2); }
.comp-card.comp-error .comp-card-header { background:#180e06; border-bottom-color:#3a2010; }
.comp-name { font-size:.82rem; font-weight:600; color:var(--text); flex:1; }
.comp-state-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); }
.comp-kv { padding:.4rem .85rem; border-right:1px solid var(--border2); border-bottom:1px solid var(--border2); }
.comp-k { font-size:.65rem; color:var(--muted); margin-bottom:2px; }
.comp-v { font-size:.77rem; color:var(--text); font-family:var(--font-mono); }
.comp-v.good { color:var(--green); }
.comp-v.bad  { color:var(--red); }
.comp-v.warn { color:var(--yellow); }
.comp-v.null { color:#475569; }
.caps-pills { display:flex; flex-wrap:wrap; gap:.3rem; padding:.45rem .85rem; border-top:1px solid var(--border2); }
.cap-pill { font-size:.65rem; padding:.15rem .5rem; border-radius:999px; background:var(--surface2); border:1px solid var(--border); color:var(--muted); font-family:var(--font-mono); }
.data-age { font-size:.63rem; color:#475569; padding:.3rem .85rem; font-style:italic; border-top:1px solid var(--border2); }

/* Logs tab */
.log-toolbar { display:flex; align-items:center; gap:.75rem; padding:.55rem 1.25rem; border-bottom:1px solid var(--border); flex-shrink:0; background:var(--surface); }
.log-toolbar-label { font-size:.74rem; color:var(--muted); }
.btn-sm { font-size:.71rem; padding:.22rem .6rem; border-radius:var(--radius-sm); border:1px solid var(--border); background:none; color:var(--muted); cursor:pointer; }
.btn-sm:hover { background:var(--surface-hover); color:var(--text); }
.log-feed { flex:1; overflow-y:auto; padding:.5rem 1.25rem; font-family:var(--font-mono); font-size:.75rem; }
.log-line { display:flex; gap:.75rem; padding:.18rem 0; border-bottom:1px solid #0d131d; }
.log-ts { color:#475569; flex-shrink:0; width:80px; }
.log-level { flex-shrink:0; width:40px; font-weight:600; }
.log-level.INFO  { color:#60a5fa; }
.log-level.WARN  { color:var(--yellow); }
.log-level.ERROR { color:var(--red); }
.log-level.DEBUG { color:#475569; }
.log-comp { color:var(--muted); flex-shrink:0; width:85px; overflow:hidden; text-overflow:ellipsis; }
.log-msg { color:var(--text); word-break:break-all; }

/* Commands tab */
.cmd-tab-body { flex:1; overflow-y:auto; padding:1.25rem; display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; align-content:start; }
.cmd-form-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.cmd-form-title { font-size:.63rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); padding:.5rem .85rem; border-bottom:1px solid var(--border); background:var(--surface2); }
.cmd-form-body { padding:.85rem; display:flex; flex-direction:column; gap:.6rem; }
.cmd-select, .cmd-input, .cmd-textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:.45rem .7rem; color:var(--text); font-size:.8rem; font-family:inherit; outline:none; }
.cmd-select:focus, .cmd-input:focus, .cmd-textarea:focus { border-color:var(--accent); }
.cmd-textarea { font-family:var(--font-mono); font-size:.75rem; resize:vertical; min-height:70px; }
.quick-cmds { display:flex; flex-wrap:wrap; gap:.4rem; }
.quick-cmd { font-size:.7rem; padding:.22rem .6rem; border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--muted); cursor:pointer; background:none; }
.quick-cmd:hover { background:var(--surface-hover); color:var(--text); }
.btn-primary { background:var(--accent); color:#0d1017; border:none; border-radius:var(--radius-sm); padding:.45rem 1rem; font-size:.8rem; font-weight:600; cursor:pointer; }
.cmd-history-item { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:.6rem .85rem; margin-bottom:.5rem; font-size:.75rem; }
.cmd-history-action { color:var(--accent); font-family:var(--font-mono); font-weight:600; }
.cmd-history-meta { color:var(--muted); margin-top:.2rem; display:flex; gap:.75rem; }
.cmd-history-result { color:var(--green); font-weight:600; }
.cmd-history-result.fail { color:var(--red); }
.section-label { font-size:.65rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); padding-bottom:.5rem; border-bottom:1px solid var(--border); margin-bottom:.5rem; }

/* Raw tab */
.raw-tab-body { flex:1; overflow-y:auto; padding:1rem 1.25rem; display:flex; flex-direction:column; gap:.6rem; }
.raw-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.raw-section summary { padding:.5rem .85rem; font-size:.7rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); cursor:pointer; background:var(--surface2); user-select:none; }
.raw-section summary:hover { color:var(--text); }
.raw-pre { font-family:var(--font-mono); font-size:.73rem; padding:.85rem; color:#94a3b8; white-space:pre-wrap; word-break:break-all; border-top:1px solid var(--border); }

.empty-state { flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:.85rem; }
</style>
</head>
<body>

<nav class="topnav">
  <span class="brand">LUCID</span>
  <span class="nav-sep">Central Command</span>
  <div class="nav-links">
    <span class="nav-link active">Fleet</span>
    <span class="nav-link">Experiments</span>
    <span class="nav-link">AI Assistant</span>
    <div class="nav-tools-wrap">
      <span class="nav-tools" onclick="this.nextElementSibling.classList.toggle('open')">Tools ▾</span>
      <div class="tools-dropdown">
        <span class="tools-item">Topic Tree</span>
        <span class="tools-item">Users</span>
        <span class="tools-item">Auth Log</span>
        <span class="tools-item">Schema</span>
      </div>
    </div>
  </div>
  <span class="ws-badge">⬤ live</span>
</nav>

<div class="fleet-layout">

  <!-- Sidebar -->
  <aside class="fleet-sidebar">
    <div class="sidebar-header">Fleet <span class="sidebar-count">8 online</span></div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </aside>

  <!-- Right panel: everything in one place -->
  <div class="fleet-detail" id="fleet-detail">
    <div class="empty-state" id="fleet-empty">Select an agent</div>

    <div id="agent-panel" style="display:none;flex:1;flex-direction:column;overflow:hidden;">

      <!-- Agent header -->
      <div class="agent-header">
        <span class="agent-name-large" id="panel-name"></span>
        <span class="status-badge" id="panel-badge"></span>
        <div class="agent-meta-bar" id="panel-meta"></div>
      </div>

      <!-- Tab bar — right in the panel, no page navigation -->
      <div class="agent-tabs">
        <span class="tab-btn active" onclick="switchTab('components')">Components</span>
        <span class="tab-btn" onclick="switchTab('logs')">Logs</span>
        <span class="tab-btn" onclick="switchTab('commands')">Commands</span>
        <span class="tab-btn" onclick="switchTab('raw')">Raw JSON</span>
      </div>

      <!-- Tab: Components -->
      <div class="tab-pane active" id="tab-components">
        <div class="components-tab">
          <div class="info-section">
            <div class="info-card">
              <div class="info-card-title">Agent</div>
              <table class="kv-table" id="panel-agent-kv"></table>
            </div>
          </div>
          <div class="components-section" id="panel-components"></div>
        </div>
      </div>

      <!-- Tab: Logs -->
      <div class="tab-pane" id="tab-logs">
        <div class="log-toolbar">
          <span class="log-toolbar-label">Live feed — last 500 lines</span>
          <button class="btn-sm">Clear</button>
          <button class="btn-sm">Pause</button>
        </div>
        <div class="log-feed" id="log-feed"></div>
      </div>

      <!-- Tab: Commands -->
      <div class="tab-pane" id="tab-commands">
        <div class="cmd-tab-body">
          <div class="cmd-form-card">
            <div class="cmd-form-title">Send Command</div>
            <div class="cmd-form-body">
              <select class="cmd-select" id="cmd-target-sel"></select>
              <div class="quick-cmds" id="quick-cmds-el"></div>
              <input class="cmd-input" placeholder="action" />
              <textarea class="cmd-textarea" placeholder='{"key":"value"}  optional'></textarea>
              <button class="btn-primary">Send Command</button>
            </div>
          </div>
          <div>
            <div class="section-label">Recent Commands</div>
            <div id="cmd-history-el"></div>
          </div>
        </div>
      </div>

      <!-- Tab: Raw JSON -->
      <div class="tab-pane" id="tab-raw">
        <div class="raw-tab-body" id="raw-pane"></div>
      </div>

    </div>
  </div>
</div>

  {action:'ping',           target:'agent',      result:true,  ts:'11:28:00', duration:'120ms'},
  {action:'roslaunch_stop', target:'ros_bridge', result:false, ts:'11:20:14', duration:'timeout'},
  {action:'ping',           target:'ros_bridge', result:true,  ts:'10:45:32', duration:'88ms'},
];

let selectedAgent = null;

function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  let html = '';
  AGENTS.forEach(a => {
    html += `<div class="sidebar-item${selectedAgent===a.id?' active':''}" onclick="selectAgent('${a.id}')">
      <div class="status-dot dot-online"></div>
      <span class="sidebar-agent-name">${a.id}</span>
    </div>`;
  });
  html += '<hr class="sidebar-sep">';
  STALE.forEach(s => {
    html += `<div class="sidebar-item stale"><div class="status-dot dot-unknown"></div><span class="sidebar-agent-name">${s}</span></div>`;
  });
  html += `<button class="sidebar-clean-btn" onclick="event.stopPropagation()">✕ Clean up stale (${STALE.length})</button>`;
  list.innerHTML = html;
}

function selectAgent(id) {
  selectedAgent = id;
  renderSidebar();
  const agent = AGENTS.find(a => a.id === id);
  if (!agent) return;

  document.getElementById('fleet-empty').style.display = 'none';
  const panel = document.getElementById('agent-panel');
  panel.style.display = 'flex';

  document.getElementById('panel-name').textContent = agent.id;
  const badge = document.getElementById('panel-badge');
  badge.textContent = agent.status;
  badge.className = 'status-badge badge-' + agent.status;
  document.getElementById('panel-meta').innerHTML =
    `${agent.platform} / ${agent.arch} &nbsp;·&nbsp; v${agent.version} &nbsp;·&nbsp; uptime ${agent.uptime} &nbsp;·&nbsp; <span style="color:var(--yellow)">last seen ${agent.lastSeen}</span>`;

  // Agent KV
  document.getElementById('panel-agent-kv').innerHTML = [
    ['platform', agent.platform],
    ['arch', agent.arch],
    ['version', agent.version],
    ['uptime', agent.uptime],
    ['heartbeat', agent.heartbeat + 's'],
    ['first seen', agent.firstSeen],
  ].map(([k,v]) => `<tr><td class="kv-key">${k}</td><td class="kv-val">${v}</td></tr>`).join('');

  // Components
  document.getElementById('panel-components').innerHTML = agent.components.map(c => {
    const isError = c.status === 'error';
    const stateHtml = Object.entries(c.state).map(([k,v]) => {
      const cls = (c.stateColors||{})[k] || '';
      return `<div class="comp-kv"><div class="comp-k">${k}</div><div class="comp-v ${cls}">${v}</div></div>`;
    }).join('');
    const ageHtml = c.dataAge ? `<div class="data-age">${c.dataAge}</div>` : '';
    const ver = c.version ? `<span style="font-size:.68rem;color:var(--muted);font-family:var(--font-mono)">v${c.version}</span>` : '';
    const pillsHtml = c.caps ? `<div class="caps-pills">${c.caps.split(' · ').map(cap => `<span class="cap-pill">${cap}</span>`).join('')}</div>` : '';
    return `<div class="comp-card${isError?' comp-error':''}">
      <div class="comp-card-header">
        <span class="comp-name">${c.id}</span>
        <span class="status-badge badge-${c.status}">${c.status}</span>
        ${ver}
      </div>
      <div class="comp-state-grid">${stateHtml}</div>
      ${pillsHtml}
      ${ageHtml}
    </div>`;
  }).join('');

  // Logs
  document.getElementById('log-feed').innerHTML = FAKE_LOGS.map(l =>
    `<div class="log-line">
      <span class="log-ts">${l.ts}</span>
      <span class="log-level ${l.level}">${l.level}</span>
      <span class="log-comp">${l.comp}</span>
      <span class="log-msg">${l.msg}</span>
    </div>`).join('');

  // Commands
  document.getElementById('cmd-target-sel').innerHTML =
    `<option>Agent (${agent.id})</option>` +
    agent.components.map(c => `<option>Component: ${c.id}</option>`).join('');
  document.getElementById('quick-cmds-el').innerHTML =
    ['ping','restart','reload-components'].map(a =>
      `<button class="quick-cmd">${a}</button>`).join('');
  document.getElementById('cmd-history-el').innerHTML = FAKE_CMD_HISTORY.map(c =>
    `<div class="cmd-history-item">
      <span class="cmd-history-action">${c.action}</span> → ${c.target}
      <div class="cmd-history-meta">
        <span>${c.ts}</span><span>${c.duration}</span>
        <span class="cmd-history-result${c.result?'':' fail'}">${c.result?'✓ ok':'✗ failed'}</span>
      </div>
    </div>`).join('');

  // Raw JSON
  document.getElementById('raw-pane').innerHTML = [
    ['Status',     {state: agent.status, uptime_s: 410289}],
    ['Metadata',   {platform: agent.platform, architecture: agent.arch, version: agent.version}],
    ['Config',     {heartbeat_s: agent.heartbeat}],
    ['Components', Object.fromEntries(agent.components.map(c => [c.id, {status:c.status, state:c.state}]))],
  ].map(([title, data]) =>
    `<details class="raw-section" open>
      <summary>${title}</summary>
      <pre class="raw-pre">${JSON.stringify(data, null, 2)}</pre>
    </details>`).join('');

  switchTab('components');
}

function switchTab(name) {
  document.querySelectorAll('.agent-tabs .tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase().startsWith(name));
  });
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name)?.classList.add('active');
}

renderSidebar();
selectAgent('rosbot');
</script>
</body>
</html>
