{% extends "base.html" %}
{% block title %}AI Assistant · LUCID{% endblock %}

{% block content %}
<div class="page-header">
  <h1>AI Assistant</h1>
</div>

<div class="ai-chat-layout">
  <!-- Session sidebar -->
  <aside class="ai-sidebar panel">
    <div class="ai-sidebar-header">
      <h3>Sessions</h3>
      <button id="new-chat-btn" class="btn-sm">+ New</button>
    </div>
    <div id="session-list" class="ai-session-list">
      <div class="empty">Loading…</div>
    </div>
  </aside>

  <!-- Chat area -->
  <div class="ai-chat-main">
    <div class="ai-messages-panel panel">
      <div id="messages" class="ai-messages"></div>
      <div id="loading" class="ai-loading hidden">
        <span class="ai-dot"></span><span class="ai-dot"></span><span class="ai-dot"></span>
        <span id="timer" class="ai-timer hidden"></span>
      </div>
    </div>

    <div class="ai-input-bar">
      <textarea id="input" class="ai-textarea" rows="2" placeholder="Ask anything about the fleet…"></textarea>
      <div class="ai-input-actions">
        <button id="voice-btn" class="btn-voice hidden" title="Hold to talk">&#x1F3A4;</button>
        <button id="send-btn" class="btn-primary">Send</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/ai_chat.js"></script>
{% endblock %}
