{% extends "base.html" %}
{% block title %}Experiment Runs · LUCID{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Experiment Runs</h1>
  <a href="/experiments/templates" class="btn-sm">+ New Run</a>
</div>

<div class="runs-toolbar">
  <label style="font-size:0.8rem;color:var(--muted)">Filter:</label>
  <select id="status-filter" onchange="loadRuns()">
    <option value="">All statuses</option>
    <option value="pending">Pending</option>
    <option value="running">Running</option>
    <option value="completed">Completed</option>
    <option value="failed">Failed</option>
    <option value="cancelled">Cancelled</option>
  </select>
  <span id="run-count" class="subtitle"></span>
</div>

<div class="table-wrap">
  <table class="data-table" id="runs-table">
    <thead>
      <tr>
        <th>Run ID</th>
        <th>Template</th>
        <th>Status</th>
        <th>Started</th>
        <th>Duration</th>
        <th>Error</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="runs-body">
      <tr><td colspan="7" class="empty">Loading…</td></tr>
    </tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/experiments_runs.js"></script>
{% endblock %}
