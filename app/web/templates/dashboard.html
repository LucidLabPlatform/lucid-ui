{% extends "base.html" %}
{% block title %}Fleet · LUCID{% endblock %}

{% block content %}
<div class="fleet-layout">

  <!-- Sidebar: agent list -->
  <aside class="fleet-sidebar">
    <div class="sidebar-header">
      Fleet
      <span class="sidebar-count" id="fleet-count">loading…</span>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </aside>

  <!-- Right panel: selected agent -->
  <div class="fleet-detail" id="fleet-detail">
    <div class="fleet-empty" id="fleet-empty">← Select an agent</div>

    <div id="agent-panel" style="display:none">
      <!-- Agent header -->
      <div class="agent-header">
        <span class="agent-header-name" id="h-name"></span>
        <span class="status-badge" id="h-badge"></span>
        <span class="agent-header-meta" id="h-meta"></span>
        <label class="adv-toggle">
          <input type="checkbox" id="adv-chk"> Advanced
        </label>
      </div>

      <!-- Scrollable content: component cards + advanced sections -->
      <div class="agent-scroll" id="agent-scroll"></div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/dashboard.js"></script>
{% endblock %}
