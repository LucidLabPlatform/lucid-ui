{% extends "base.html" %}
{% block title %}Auth Log · LUCID{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Auth Log</h1>
  <span class="subtitle" id="log-meta">Loading…</span>
</div>

<div class="log-filters">
  <input id="search" placeholder="Search username / topic…" style="width:220px">
  <select id="filter-type">
    <option value="">All types</option>
    <option value="authn">authn</option>
    <option value="authz">authz</option>
  </select>
  <select id="filter-result">
    <option value="">All results</option>
    <option value="allow">allow</option>
    <option value="deny">deny</option>
  </select>
</div>

<div class="table-wrap">
  <table class="data-table">
    <thead>
      <tr>
        <th>Time</th>
        <th>Type</th>
        <th>Username</th>
        <th>Client ID</th>
        <th>Topic</th>
        <th>Action</th>
        <th>Result</th>
      </tr>
    </thead>
    <tbody id="log-tbody"></tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/auth_log.js"></script>
{% endblock %}
