{% extends "base.html" %}
{% block title %}MQTT — LUCID{% endblock %}

{% block content %}
<style>
  /* ── Page layout: fill remaining viewport below nav ── */
  main { height: calc(100vh - 44px); overflow: hidden; display: flex; flex-direction: column; }

  /* ── Connection screen ── */
  .mqtt-connect-screen {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .mqtt-connect-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 2rem 1.75rem; width: 360px;
  }
  .mqtt-connect-title {
    font-size: 1rem; font-weight: 700; color: var(--accent);
    letter-spacing: 0.05em; margin-bottom: 0.3rem;
  }
  .mqtt-connect-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 1.5rem; }
  .mqtt-connect-grid {
    display: grid; grid-template-columns: 1fr 100px; gap: 0.5rem; margin-bottom: 0.5rem;
  }
  .mqtt-connect-full { grid-column: 1 / -1; }
  .mqtt-field { display: flex; flex-direction: column; gap: 0.2rem; }
  .mqtt-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .mqtt-input {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); padding: 0.4rem 0.6rem; font-size: 0.82rem;
    font-family: var(--font-mono); outline: none; width: 100%;
    transition: border-color var(--transition);
  }
  .mqtt-input:focus { border-color: var(--accent); }
  .mqtt-connect-btn {
    width: 100%; margin-top: 1rem; padding: 0.55rem;
    background: var(--accent); color: #0f1117; border: none;
    border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 700;
    cursor: pointer; transition: filter var(--transition);
  }
  .mqtt-connect-btn:hover { filter: brightness(1.1); }
  .mqtt-connect-btn:disabled { opacity: 0.6; cursor: default; }
  .mqtt-connect-error {
    background: rgba(248,113,113,0.1); color: var(--red);
    border: 1px solid rgba(248,113,113,0.2); border-radius: var(--radius-sm);
    padding: 0.4rem 0.65rem; font-size: 0.78rem; margin-top: 0.75rem;
  }

  /* ── Workspace ── */
  .mqtt-workspace {
    flex: 1; display: flex; overflow: hidden; position: relative;
  }

  /* ── Topic tree panel ── */
  .mqtt-tree {
    width: 230px; flex-shrink: 0; background: var(--bg);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
  }
  .mqtt-panel-hdr {
    height: 38px; display: flex; align-items: center; gap: 0.5rem;
    padding: 0 0.85rem; border-bottom: 1px solid var(--border);
    background: var(--surface-2);
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--muted); flex-shrink: 0;
  }
  .mqtt-panel-hdr-icon { color: var(--accent); }
  .mqtt-tree-filter {
    margin: 0.45rem; padding: 0.3rem 0.6rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 0.75rem; color: var(--text);
    outline: none; width: calc(100% - 0.9rem);
    transition: border-color var(--transition);
  }
  .mqtt-tree-filter:focus { border-color: var(--accent); }
  .mqtt-tree-filter::placeholder { color: var(--muted); }
  .mqtt-tree-body { flex: 1; overflow-y: auto; padding: 0.2rem 0; }

  .mt-row {
    height: 26px; display: flex; align-items: center; gap: 0.35rem;
    padding: 0 0.6rem; font-size: 0.75rem; font-family: var(--font-mono);
    color: var(--muted); cursor: pointer; border-radius: var(--radius-sm);
    margin: 1px 0.3rem; transition: background var(--transition), color var(--transition);
    user-select: none; white-space: nowrap; overflow: hidden;
  }
  .mt-row:hover { background: var(--surface-hover); color: var(--text); }
  .mt-row.mt-open { color: var(--subtle); }
  .mt-row.mt-live { background: rgba(74,222,128,0.06); color: var(--green); border: 1px solid rgba(74,222,128,0.1); }
  .mt-row.mt-cmd { color: var(--border); font-style: italic; }
  .mt-row.mt-cmd:hover { color: var(--muted); background: var(--surface); }
  .mt-l1 { padding-left: 1.1rem; }
  .mt-l2 { padding-left: 1.8rem; }
  .mt-l3 { padding-left: 2.5rem; }
  .mt-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .mt-dot-g { background: var(--green); box-shadow: 0 0 4px rgba(74,222,128,0.5); }
  .mt-dot-y { background: var(--yellow); }
  .mt-dot-d { background: #374151; }
  .mt-badge {
    margin-left: auto; font-size: 0.58rem; font-weight: 600; flex-shrink: 0;
    background: var(--surface-2); color: var(--muted); border-radius: 3px; padding: 0 3px;
  }
  .mt-live-badge {
    margin-left: auto; font-size: 0.58rem; font-weight: 700; flex-shrink: 0;
    background: rgba(74,222,128,0.1); color: var(--green); border-radius: 3px; padding: 0 4px;
  }

  /* ── Viewers area ── */
  .mqtt-viewers { flex: 1; display: flex; overflow: hidden; }

  .mqtt-viewer {
    flex: 1; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; min-width: 160px; background: var(--bg);
  }
  .mqtt-viewer:last-child { border-right: none; }

  .mv-hdr {
    height: 38px; background: var(--surface-2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 0.75rem; gap: 0.45rem; flex-shrink: 0;
  }
  .mv-live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0;
    animation: mv-pulse 1.8s ease-in-out infinite;
  }
  @keyframes mv-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .mv-topic {
    font-size: 0.68rem; font-family: var(--font-mono); color: var(--muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
  }
  .mv-topic em { color: var(--accent); font-style: normal; font-weight: 600; }
  .mv-count {
    font-size: 0.6rem; background: var(--surface); color: var(--muted);
    border-radius: 3px; padding: 0 4px; flex-shrink: 0;
  }
  .mv-close {
    color: var(--border); font-size: 0.85rem; cursor: pointer; flex-shrink: 0;
    padding: 2px 4px; border-radius: 3px; transition: color var(--transition), background var(--transition);
  }
  .mv-close:hover { color: var(--muted); background: var(--surface-hover); }
  .mv-body { flex: 1; overflow-y: auto; padding: 0.4rem; }

  .mv-msg {
    background: var(--surface); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm); margin-bottom: 0.3rem;
    padding: 0.4rem 0.6rem; font-family: var(--font-mono); font-size: 0.7rem;
  }
  .mv-msg.mv-flash { animation: mv-flash 0.4s ease; }
  @keyframes mv-flash { 0%{background:rgba(124,156,255,0.1)} 100%{background:var(--surface)} }
  .mv-msg-meta { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.25rem; }
  .mv-time { color: var(--muted); font-size: 0.65rem; }
  .mv-qos { font-size: 0.58rem; background: var(--surface-2); color: var(--muted); border-radius: 2px; padding: 0 3px; }
  .mv-ret { font-size: 0.58rem; background: rgba(74,222,128,0.08); color: var(--green); border-radius: 2px; padding: 0 3px; }
  .mv-body-text { color: var(--subtle); line-height: 1.55; word-break: break-word; white-space: pre-wrap; }
  .mv-body-text .mk { color: var(--accent); }
  .mv-body-text .ms { color: var(--green); }
  .mv-body-text .mn { color: var(--yellow); }
  .mv-body-text .mb { color: #c084fc; }

  .mv-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 0.5rem; color: var(--border);
  }
  .mv-empty-icon { font-size: 22px; }
  .mv-empty p { font-size: 0.75rem; color: var(--muted); }
  .mv-empty small { font-size: 0.65rem; }

  /* ── Add-split button ── */
  .mqtt-add-split {
    width: 30px; flex-shrink: 0; background: var(--bg);
    border-left: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--border); font-size: 15px;
    transition: color var(--transition), background var(--transition);
  }
  .mqtt-add-split:hover { color: var(--accent); background: var(--surface); }

  /* ── Publish FAB ── */
  .mqtt-fab {
    position: absolute; bottom: 1.1rem; right: 1.1rem;
    height: 36px; background: var(--accent); color: #0f1117;
    border-radius: 999px; padding: 0 1rem;
    display: flex; align-items: center; gap: 0.45rem;
    font-size: 0.8rem; font-weight: 600;
    cursor: pointer; z-index: 10;
    box-shadow: 0 4px 18px rgba(124,156,255,0.3);
    transition: transform var(--transition), box-shadow var(--transition);
    user-select: none;
  }
  .mqtt-fab:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(124,156,255,0.45); }

  /* ── Publisher drawer ── */
  .mqtt-drawer {
    position: absolute; bottom: 0; left: 0; right: 0; height: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    z-index: 20; overflow: hidden;
    transition: height 0.28s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
  }
  .mqtt-drawer.mqtt-drawer-open { height: 320px; }

  .md-hdr {
    height: 38px; display: flex; align-items: center; padding: 0 1.1rem;
    border-bottom: 1px solid var(--border); background: var(--surface-2); flex-shrink: 0;
  }
  .md-title { font-size: 0.82rem; font-weight: 600; }
  .md-badge {
    font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--accent); background: var(--accent-dim); border-radius: 3px;
    padding: 0.1rem 0.4rem; margin-left: 0.5rem;
  }
  .md-result {
    font-size: 0.72rem; margin-left: 1rem; padding: 0.15rem 0.5rem;
    border-radius: 3px; display: none;
  }
  .md-result.md-ok { background: rgba(74,222,128,0.1); color: var(--green); display: inline-block; }
  .md-result.md-err { background: rgba(248,113,113,0.1); color: var(--red); display: inline-block; }
  .md-close {
    margin-left: auto; font-size: 0.95rem; color: var(--muted); cursor: pointer;
    padding: 0.15rem 0.3rem; border-radius: var(--radius-sm);
    transition: color var(--transition), background var(--transition);
  }
  .md-close:hover { color: var(--text); background: var(--surface-hover); }

  .md-body { padding: 0.75rem 1.1rem; display: flex; flex-direction: column; gap: 0.55rem; overflow: hidden; }

  /* Topic bar */
  .md-topic-bar {
    display: flex; align-items: center;
    background: var(--bg); border: 1px solid var(--accent);
    border-radius: var(--radius-sm); height: 36px;
    box-shadow: 0 0 0 2px rgba(124,156,255,0.07); overflow: hidden;
    flex-shrink: 0;
  }
  .md-prefix {
    font-size: 0.7rem; color: var(--muted); font-family: var(--font-mono);
    white-space: nowrap; padding: 0 0.4rem 0 0.7rem; flex-shrink: 0;
  }
  .md-crumbs {
    display: flex; align-items: center; overflow-x: auto;
    flex: 1; min-width: 0; scrollbar-width: none;
  }
  .md-crumbs::-webkit-scrollbar { display: none; }
  .md-crumb {
    background: var(--surface-2); border-radius: 3px;
    padding: 0.1rem 0.45rem; font-size: 0.7rem;
    color: var(--text); font-family: var(--font-mono); white-space: nowrap;
    cursor: pointer; flex-shrink: 0;
    transition: background var(--transition), color var(--transition);
  }
  .md-crumb:hover { background: rgba(248,113,113,0.1); color: var(--red); }
  .md-crumb-x { font-size: 0.58rem; color: var(--muted); margin-left: 3px; }
  .md-sep { color: var(--border); font-size: 0.85rem; padding: 0 1px; flex-shrink: 0; }
  .md-topic-input {
    background: transparent; border: none; outline: none;
    font-size: 0.75rem; color: var(--accent); font-family: var(--font-mono);
    caret-color: var(--accent); min-width: 80px; width: 120px; padding-right: 0.5rem;
  }
  .md-topic-input::placeholder { color: var(--muted); }

  /* Autocomplete chips */
  .md-ac-row { display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; min-height: 26px; }
  .md-ac-label {
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted); flex-shrink: 0;
  }
  .md-chip {
    display: flex; align-items: center; gap: 0.28rem;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 0.18rem 0.55rem;
    font-size: 0.7rem; font-family: var(--font-mono); color: var(--subtle);
    cursor: pointer; flex-shrink: 0;
    transition: background var(--transition), border-color var(--transition), color var(--transition);
  }
  .md-chip:hover, .md-chip.md-chip-hi {
    background: var(--accent-dim); border-color: rgba(124,156,255,0.3); color: var(--accent);
  }
  .md-chip-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .md-chip-dot-g { background: var(--green); }
  .md-chip-dot-y { background: var(--yellow); }
  .md-chip-dot-d { background: #374151; }
  .md-chip.md-chip-ghost { border-style: dashed; color: var(--border); }
  .md-chip.md-chip-ghost:hover { color: var(--muted); border-color: var(--border); background: transparent; }

  /* Bottom row: payload + send */
  .md-bottom { display: flex; gap: 0.6rem; flex: 1; min-height: 0; }
  .md-payload {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 0.4rem 0.65rem;
    font-size: 0.7rem; font-family: var(--font-mono); color: var(--subtle);
    line-height: 1.6; outline: none; overflow-y: auto; resize: none;
    min-height: 0;
  }
  .md-payload:focus { border-color: var(--border); }
  .md-send {
    width: 80px; background: var(--accent); color: #0f1117;
    border-radius: var(--radius-sm); border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.82rem; font-weight: 700; cursor: pointer; flex-shrink: 0;
    transition: filter var(--transition);
  }
  .md-send:hover { filter: brightness(1.12); }
  .md-send:disabled { opacity: 0.5; cursor: default; filter: none; }

  /* ── Payload area two-mode container ── */
  .md-payload-area { flex: 1; display: flex; flex-direction: column; gap: 0.25rem; min-height: 0; }
  .md-payload-toolbar { display: flex; align-items: center; gap: 0.3rem; flex-shrink: 0; }
  .md-mode-btn {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 0.12rem 0.45rem;
    font-size: 0.62rem; font-weight: 600; color: var(--muted);
    cursor: pointer; transition: background var(--transition), color var(--transition), border-color var(--transition);
  }
  .md-mode-btn:hover { color: var(--text); }
  .md-mode-btn.md-mode-active { background: var(--accent-dim); border-color: rgba(124,156,255,0.3); color: var(--accent); }

  /* ── Schema-driven form view ── */
  .md-form-view { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.2rem; min-height: 0; }
  .md-no-fields { font-size: 0.7rem; color: var(--muted); font-style: italic; padding: 0.3rem 0; }
  .md-field-group {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 0.25rem 0.5rem;
  }
  .md-field-group-label {
    font-size: 0.58rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.15rem;
  }
  .md-field-row { display: flex; align-items: center; gap: 0.45rem; min-height: 22px; }
  .md-field-label {
    font-size: 0.66rem; color: var(--subtle); font-family: var(--font-mono);
    white-space: nowrap; min-width: 72px; flex-shrink: 0;
  }
  .md-field-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 0.18rem 0.4rem;
    font-size: 0.68rem; font-family: var(--font-mono); color: var(--text);
    outline: none; min-width: 0; transition: border-color var(--transition);
  }
  .md-field-input:focus { border-color: var(--accent); }
  .md-slider-row { display: flex; align-items: center; gap: 0.35rem; flex: 1; }
  .md-slider { flex: 1; accent-color: var(--accent); cursor: pointer; }
  .md-slider-val { font-size: 0.68rem; font-family: var(--font-mono); color: var(--accent); min-width: 28px; text-align: right; flex-shrink: 0; }
  .md-toggle-label { display: flex; align-items: center; gap: 0.3rem; cursor: pointer; }
  .md-toggle { accent-color: var(--accent); width: 13px; height: 13px; }
  .md-toggle-val { font-size: 0.68rem; font-family: var(--font-mono); color: var(--subtle); }

  /* ── Tree: component group header ── */
  .mt-comp-hdr { color: var(--subtle); font-style: normal; }
  .mt-comp-hdr:hover { color: var(--text); background: var(--surface-hover); }
  .mt-comp-icon { color: var(--accent); font-size: 0.65rem; flex-shrink: 0; }
</style>

<!-- ── Connection screen ─────────────────────────────────────── -->
<div class="mqtt-connect-screen" id="mqtt-connect-screen">
  <div class="mqtt-connect-card">
    <div class="mqtt-connect-title">MQTT Connection</div>
    <div class="mqtt-connect-sub">Connect directly to the EMQX broker via WebSocket</div>
    <div class="mqtt-connect-grid">
      <div class="mqtt-field">
        <label class="mqtt-label">Host</label>
        <input class="mqtt-input" id="mqtt-host" type="text" placeholder="10.205.10.16" autocomplete="off" />
      </div>
      <div class="mqtt-field">
        <label class="mqtt-label">Port</label>
        <input class="mqtt-input" id="mqtt-port" type="text" placeholder="8083" autocomplete="off" />
      </div>
      <div class="mqtt-field mqtt-connect-full">
        <label class="mqtt-label">Username</label>
        <input class="mqtt-input" id="mqtt-username" type="text" autocomplete="off" />
      </div>
      <div class="mqtt-field mqtt-connect-full">
        <label class="mqtt-label">Password</label>
        <input class="mqtt-input" id="mqtt-password" type="password" autocomplete="current-password" />
      </div>
    </div>
    <button class="mqtt-connect-btn" id="mqtt-connect-btn" onclick="mqttDoConnect()">Connect</button>
    <div class="mqtt-connect-error" id="mqtt-connect-error" style="display:none"></div>
  </div>
</div>

<!-- ── Workspace ─────────────────────────────────────────────── -->
<div class="mqtt-workspace hidden" id="mqtt-workspace">

  <!-- Topic tree -->
  <div class="mqtt-tree">
    <div class="mqtt-panel-hdr">
      <span class="mqtt-panel-hdr-icon">📡</span> Topics
    </div>
    <input class="mqtt-tree-filter" id="mqtt-tree-filter" type="text"
           placeholder="filter topics…" oninput="mqttFilterTree(this.value)" />
    <div class="mqtt-tree-body" id="mqtt-tree-body"></div>
  </div>

  <!-- Viewer panes -->
  <div class="mqtt-viewers" id="mqtt-viewers"></div>
  <div class="mqtt-add-split" title="Add pane" onclick="mqttAddPane()">+</div>

  <!-- Publish FAB -->
  <div class="mqtt-fab" id="mqtt-fab" onclick="mqttOpenDrawer()">⚡ Publish</div>

  <!-- Publisher drawer -->
  <div class="mqtt-drawer" id="mqtt-drawer">
    <div class="md-hdr">
      <span class="md-title">Smart Publisher</span>
      <span class="md-badge">MQTT</span>
      <span class="md-result" id="md-result"></span>
      <span class="md-close" onclick="mqttCloseDrawer()">✕</span>
    </div>
    <div class="md-body">
      <div class="md-topic-bar">
        <span class="md-prefix">lucid/agents/</span>
        <div class="md-crumbs" id="md-crumbs-scroll">
          <div id="md-crumbs-inner" style="display:flex;align-items:center;flex-shrink:0"></div>
          <input class="md-topic-input" id="md-topic-input"
                 placeholder="select agent…"
                 oninput="mdOnInput(this.value)"
                 onkeydown="mdOnKey(event)"
                 autocomplete="off" />
        </div>
      </div>
      <div class="md-ac-row" id="md-ac-row">
        <span class="md-ac-label">agents</span>
      </div>
      <div class="md-bottom">
        <div class="md-payload-area">
          <div class="md-payload-toolbar">
            <button class="md-mode-btn md-mode-active" id="md-mode-form" onclick="mdSetMode('form')">Form</button>
            <button class="md-mode-btn" id="md-mode-raw" onclick="mdSetMode('raw')">JSON</button>
          </div>
          <div id="md-form-view" class="md-form-view"></div>
          <textarea class="md-payload" id="md-payload" rows="3" spellcheck="false" style="display:none"></textarea>
        </div>
        <button class="md-send" id="md-send" onclick="mqttSend()">Send ↑</button>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block page_scripts %}
<script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
<script src="/static/fleet-mqtt.js"></script>
{% endblock %}
