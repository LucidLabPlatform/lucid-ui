{% extends "base.html" %}
{% block title %}Users · LUCID{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Users</h1>
</div>

<div id="users-sync-health" class="panel" style="margin-bottom:1rem;padding:0.9rem 1rem">
  <div class="empty">Checking sync health…</div>
</div>

<div class="users-layout">
  <!-- Add forms -->
  <section class="panel add-panel">
    <h2>Add User</h2>
    <div class="form-body">
      <select id="user-role" class="cmd-select">
        <option value="agent">Agent</option>
        <option value="observer">Observer (subscribe-only)</option>
        <option value="central-command">Central Command</option>
      </select>
      <input id="username-input" placeholder="Username (e.g. nikandros)" class="cmd-input">
      <button id="btn-add-user" class="btn-primary">Create User</button>
    </div>

    <!-- Password reveal -->
    <div id="password-reveal" class="password-reveal" style="display:none">
      <div class="password-reveal-label">Password — copy now, shown only once</div>
      <div class="password-reveal-row">
        <code id="password-value" class="password-code"></code>
        <button id="btn-copy-pw" class="btn-sm">Copy</button>
      </div>
      <div id="password-user" class="password-meta"></div>
    </div>
  </section>

  <!-- User table -->
  <section class="panel users-table-panel">
    <h2>All Users</h2>
    <div id="users-table-wrap">
      <div class="empty">Loading…</div>
    </div>
  </section>
</div>

<!-- Auth denial log -->
<div class="panel" style="margin-top:1.25rem">
  <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;flex-wrap:wrap">
    <h2 style="margin:0">Security Log</h2>
    <button class="btn-sm" id="btn-refresh-log">Refresh</button>
    <div style="margin-left:auto;display:flex;gap:0.4rem">
      <button class="cmd-log-filter-btn active" data-logfilter="all">All</button>
      <button class="cmd-log-filter-btn" data-logfilter="authn">Auth Failures</button>
      <button class="cmd-log-filter-btn" data-logfilter="authz">Topic Denials</button>
    </div>
  </div>
  <div id="auth-log-wrap">
    <div class="empty">Loading…</div>
  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script src="/static/users.js"></script>
{% endblock %}
