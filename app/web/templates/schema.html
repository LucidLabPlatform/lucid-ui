{% extends "base.html" %}
{% block title %}Schema · LUCID{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Database Schema</h1>
  <span class="subtitle" id="schema-meta">Loading…</span>
</div>

<div class="schema-tabs">
  <button class="schema-tab active" data-tab="diagram">Diagram</button>
  <button class="schema-tab" data-tab="tables">Tables</button>
  <button class="schema-tab" data-tab="relations">Relations</button>
</div>

<!-- Diagram view -->
<div id="tab-diagram" class="schema-tab-content active">
  <div class="diagram-toolbar">
    <button class="btn-sm" id="diagram-fit">Fit to view</button>
    <button class="btn-sm" id="diagram-reset">Reset layout</button>
    <span class="diagram-hint">Scroll to zoom · Drag tables to rearrange · Drag background to pan</span>
  </div>
  <div id="diagram-container" class="diagram-container">
    <svg id="diagram-svg"></svg>
  </div>
</div>

<!-- Tables view -->
<div id="tab-tables" class="schema-tab-content">
  <div class="log-filters">
    <input id="search" placeholder="Search table or column…" style="width:240px">
  </div>
  <div id="schema-tables" class="schema-grid"></div>
</div>

<!-- Relations view -->
<div id="tab-relations" class="schema-tab-content">
  <div class="table-wrap">
    <table class="data-table" id="relations-table">
      <thead>
        <tr>
          <th>From</th>
          <th>Column</th>
          <th></th>
          <th>To</th>
          <th>Column</th>
        </tr>
      </thead>
      <tbody id="relations-tbody"></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/schema.js"></script>
{% endblock %}
