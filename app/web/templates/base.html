<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LUCID{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/uplot@1.6.30/dist/uPlot.min.css">
</head>
<body>
  <nav class="topnav">
    <span id="ws-status" class="ws-dot ws-dot-disconnected"></span>
    <a href="/" class="brand">LUCID</a>
    <a href="/" class="nav-tab{% if page_id in ('fleet', 'agent_detail', 'agent_components', 'component_detail', 'components', 'components_type') %} active{% endif %}">Fleet</a>
    <a href="/experiments" class="nav-tab{% if page_id in ('experiments', 'experiment_template', 'experiment_run', 'experiment_runs', 'experiment_run_config') %} active{% endif %}">Experiments</a>
    <a href="/users" class="nav-tab{% if page_id == 'users' %} active{% endif %}">Users</a>
    <a href="/topic-links" class="nav-tab{% if page_id == 'topic_links' %} active{% endif %}">Topic Links</a>
    <a href="/mqtt" class="nav-tab{% if page_id == 'mqtt' %} active{% endif %}">MQTT</a>
    <div class="nav-spacer"></div>
    <button class="nav-cmd-log-btn" id="cmd-log-toggle-btn" title="Command Log">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span class="cmd-log-badge hidden" id="cmd-log-badge"></span>
    </button>
    <button class="nav-log-btn" id="log-toggle-btn" title="Live Logs">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span class="log-badge" id="log-badge" style="display:none"></span>
    </button>
    <button class="nav-search-btn" id="palette-hint" aria-label="Search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    {% if user %}
    <div class="nav-avatar-wrap" id="nav-avatar-wrap">
      <button class="nav-avatar" id="nav-avatar">{{ user[0]|upper }}</button>
      <div class="nav-avatar-dropdown hidden" id="nav-avatar-dropdown">
        <div class="nav-avatar-info">
          <span class="nav-avatar-name">{{ user }}</span>
          <span class="nav-avatar-role">Administrator</span>
        </div>
        <div class="nav-avatar-divider"></div>
        <a href="/logout" class="nav-avatar-action">Logout</a>
      </div>
    </div>
    {% endif %}
  </nav>
  {% block subnav %}{% endblock %}
  <main>{% block content %}{% endblock %}</main>

  <!-- Global overlays (available on all pages) -->
  <div class="cmd-panel-overlay hidden" id="cmd-panel-overlay"></div>
  <div class="cmd-panel hidden" id="cmd-panel"></div>
  <div class="palette-overlay hidden" id="palette-overlay">
    <div class="palette" id="palette">
      <input type="text" class="palette-input" id="palette-input" placeholder="Search agents, components, commands…" autocomplete="off">
      <div class="palette-results" id="palette-results"></div>
    </div>
  </div>
  <div class="toast-container" id="toast-container"></div>

  <!-- Command log drawer -->
  <div class="cmd-log-overlay hidden" id="cmd-log-overlay"></div>
  <div class="cmd-log-drawer" id="cmd-log-drawer">
    <div class="cmd-log-header">
      <span class="cmd-log-title">Command Log</span>
      <button class="cmd-log-clear-btn" id="cmd-log-clear-btn">Clear</button>
      <button class="cmd-log-close-btn" id="cmd-log-close-btn">&times;</button>
    </div>
    <div class="cmd-log-filters">
      <button class="cmd-log-filter-btn active" data-filter="all">All</button>
      <button class="cmd-log-filter-btn" data-filter="errors">Errors</button>
      <button class="cmd-log-filter-btn" data-filter="mine">Mine</button>
    </div>
    <div class="cmd-log-feed" id="cmd-log-feed"></div>
    <div class="cmd-log-empty" id="cmd-log-empty">No commands yet</div>
  </div>

  <!-- Live log panel (bottom drawer) -->
  <div class="log-panel" id="log-panel">
    <div class="log-panel-header">
      <span class="log-panel-title">Live Logs</span>
      <div class="log-panel-controls">
        <select class="log-sel" id="log-level-sel" title="Level filter"></select>
        <select class="log-sel" id="log-source-sel" title="Source filter"><option value="">All sources</option></select>
        <button class="log-btn" id="log-scroll-bottom" title="Scroll to bottom">&#8595;</button>
        <button class="log-btn" id="log-clear-btn" title="Clear">Clear</button>
        <button class="log-btn log-btn-close" id="log-close-btn" title="Close">&times;</button>
      </div>
    </div>
    <div class="log-feed" id="log-feed"></div>
  </div>

  <!-- Shared JS -->
  <script>window.LUCID = window.LUCID || {}; LUCID.apiBase = "";</script>
  {% block page_data %}{% endblock %}
  <script src="https://unpkg.com/uplot@1.6.30/dist/uPlot.iife.min.js"></script>
  <script src="https://unpkg.com/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="/static/fleet-utils.js"></script>
  <script src="/static/fleet.js"></script>
  <script src="/static/fleet-toasts.js"></script>
  <script src="/static/fleet-cmd-log.js"></script>
  <script src="/static/fleet-components.js"></script>
  <script src="/static/fleet-sparklines.js"></script>
  <script src="/static/fleet-command-panel.js"></script>
  <script src="/static/fleet-command-palette.js"></script>
  <script src="/static/fleet-breadcrumb.js"></script>
  <script src="/static/fleet-bulk-commands.js"></script>
  <script src="/static/fleet-logs-panel.js"></script>
  {% block page_scripts %}{% endblock %}
</body>
</html>
