<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LUCID{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/uplot@1.6.30/dist/uPlot.min.css">
</head>
<body>
  <nav class="topnav">
    <a href="/" class="brand">LUCID</a>
    <span class="nav-sep">Central Command</span>
    <a href="/" class="nav-tab{% if page_id in ('fleet', 'agent_detail', 'agent_components', 'component_detail', 'components', 'components_type') %} active{% endif %}">Fleet</a>
    <a href="/experiments" class="nav-tab{% if page_id in ('experiments', 'experiment_template', 'experiment_run') %} active{% endif %}">Experiments</a>
    <div class="nav-spacer"></div>
    <kbd class="kbd-hint" id="palette-hint">&#8984;K</kbd>
    <div class="nav-user">
      {% if user %}<span class="nav-username">{{ user }}</span>
      <a href="/logout" class="nav-logout">Logout</a>{% endif %}
      <span id="ws-status" class="ws-badge ws-disconnected">&#x2B24; disconnected</span>
    </div>
  </nav>
  {% block subnav %}{% endblock %}
  <main>{% block content %}{% endblock %}</main>

  <!-- Global overlays (available on all pages) -->
  <div class="cmd-panel-overlay hidden" id="cmd-panel-overlay"></div>
  <div class="cmd-panel hidden" id="cmd-panel"></div>
  <div class="palette-overlay hidden" id="palette-overlay">
    <div class="palette" id="palette">
      <input type="text" class="palette-input" id="palette-input" placeholder="Search agents, components, commands…" autocomplete="off">
      <div class="palette-results" id="palette-results"></div>
    </div>
  </div>
  <div class="toast-container" id="toast-container"></div>

  <!-- Shared JS -->
  <script>window.LUCID = window.LUCID || {}; LUCID.apiBase = "";</script>
  {% block page_data %}{% endblock %}
  <script src="https://unpkg.com/uplot@1.6.30/dist/uPlot.iife.min.js"></script>
  <script src="/static/fleet-utils.js"></script>
  <script src="/static/fleet.js"></script>
  <script src="/static/fleet-toasts.js"></script>
  <script src="/static/fleet-components.js"></script>
  <script src="/static/fleet-sparklines.js"></script>
  <script src="/static/fleet-command-panel.js"></script>
  <script src="/static/fleet-command-palette.js"></script>
  <script src="/static/fleet-breadcrumb.js"></script>
  <script src="/static/fleet-bulk-commands.js"></script>
  {% block page_scripts %}{% endblock %}
</body>
</html>
